<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador IA | Orquídea Wellness</title>

    <!-- SEO -->
    <meta name="description"
        content="Centro integral de bienestar especializado en fisioterapia, cosmiatría facial y corporal, terapias holísticas, masajes y orientación psicológica.">
    <meta name="keywords" content="fisioterapia, cosmiatría, masajes, acupuntura, psicología, bienestar">
    <meta name="author" content="Orquídea Wellness">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/simulador.css">

    <link rel="icon" href="assets/icons/favicon.ico">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm" id="navbar">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="assets/logo/Logo-OrquideaWellness.png" alt="Orquídea Wellness" class="logo-navbar">

                <div class="ms-2">
                    <span class="brand-title">ORQUÍDEA</span><br>
                    <small class="brand-subtitle">WELLNESS</small>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orquia.html">
                            <i class="bi bi-robot me-1"></i> OrquIA
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="simulador.html">
                            <i class="bi bi-stars me-1"></i> Simulador IA
                        </a>
                    </li>
                </ul>

                <button class="btn btn-outline-light ms-lg-3" id="darkModeBtn" aria-label="Cambiar modo oscuro"
                    title="Cambiar modo oscuro">

                    <i class="bi bi-moon-stars-fill"></i>

                </button>

            </div>

        </div>
    </nav>


    <!-- CONTENIDO -->
    <main class="simulador-container">

        <section class="simulador-header">
            <h1>Simulador IA de Bienestar</h1>
            <p>Describe qué cambio te gustaría realizar en ti.</p>
        </section>

        <!-- INPUT -->
        <section class="simulador-input">
            <textarea id="inputSimulador" placeholder="Ej: Me siento estresado, con tensión en el cuello..."></textarea>

            <button onclick="ejecutarSimulador()">
                Generar recomendación
            </button>
        </section>

        <!-- RESULTADO -->
        <section class="simulador-result">
            <h2>Resultado</h2>
            <div id="resultadoSimulador">
                Aquí aparecerá tu recomendación...
            </div>
        </section>

    </main>
     <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="./js/simulador.js"></script>

</body>

</html>
