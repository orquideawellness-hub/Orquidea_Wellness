<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador IA | Orquídea Wellness</title>

    <meta name="description"
        content="Centro integral de bienestar especializado en fisioterapia, cosmiatría facial y corporal, terapias holísticas, masajes y orientación psicológica.">
    <meta name="keywords" content="fisioterapia, cosmiatría, masajes, acupuntura, psicología, bienestar">
    <meta name="author" content="Orquídea Wellness">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/simulador.css">
    <link rel="icon" href="assets/icons/favicon.ico">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm" id="navbar">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/logo/Logo-OrquideaWellness.png" alt="Orquídea Wellness" class="logo-navbar">

                <div class="ms-2">
                    <span class="brand-title">ORQUÍDEA</span><br>
                    <small class="brand-subtitle">WELLNESS</small>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="orquia.html"><i class="bi bi-robot me-1"></i>
                            OrquIA</a></li>
                    <li class="nav-item"><a class="nav-link active" href="simulador.html"><i
                                class="bi bi-stars me-1"></i> Simulador IA</a></li>
                </ul>
                <button class="btn btn-outline-light ms-lg-3" id="darkModeBtn" aria-label="Cambiar modo oscuro"
                    title="Cambiar modo oscuro">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="simulador-container">
        <header class="simulador-header">
            <h1>Simulador IA</h1>
            <p>
                Visualiza una simulación referencial del resultado de tus tratamientos
                faciales mediante inteligencia artificial.
            </p>
        </header>

        <div class="container">
            <div class="row g-4">

                <div class="col-lg-4">
                    <div class="card shadow-sm p-4 mb-4">
                        <h3 class="mb-4">1. Sube tu foto</h3>
                        <input type="file" id="fotoInput" accept="image/*" class="form-control mb-3">
                        <img id="previewOriginal" class="img-fluid rounded d-none" alt="Foto original del usuario">
                    </div>

                    <div class="card shadow-sm p-4">
                        <h3 class="mb-4">2. Selecciona tratamientos</h3>
                        <div class="form-check"><input class="form-check-input tratamiento" type="checkbox"
                                value="Antiage"><label class="form-check-label">Antiage</label></div>
                        <div class="form-check"><input class="form-check-input tratamiento" type="checkbox"
                                value="Antiacné"><label class="form-check-label">Antiacné</label></div>
                        <div class="form-check"><input class="form-check-input tratamiento" type="checkbox"
                                value="Pigmentación"><label class="form-check-label">Pigmentación</label></div>
                        <div class="form-check"><input class="form-check-input tratamiento" type="checkbox"
                                value="Hydrafacial"><label class="form-check-label">Hydrafacial</label></div>
                        <div class="form-check"><input class="form-check-input tratamiento" type="checkbox"
                                value="Rosácea"><label class="form-check-label">Rosácea</label></div>
                        <button id="btnProbar" class="btn btn-gold mt-4 w-100">✨ Probar simulación</button>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card shadow-sm p-4 h-100">
                        <h3 class="mb-4">Resultado IA</h3>

                        <div class="row g-3">
                            <div class="col-6 text-center">
                                <small class="d-block text-muted">Antes</small>
                                <img id="previewAntes" class="img-fluid img-thumbnail rounded mt-2 d-none"
                                    alt="Foto original">
                            </div>
                            <div class="col-6 text-center">
                                <small class="d-block text-muted">Después</small>
                                <img id="previewIA" class="img-fluid img-thumbnail rounded mt-2 d-none"
                                    alt="Simulación IA">
                            </div>
                        </div>

                        <div id="scoreContainer" class="mt-4"></div>
                        <button id="btnRecomendaciones" class="btn btn-outline-success btn-sm w-100 mt-4 d-none">
                            Ver sugerencias adicionales
                        </button>
                        <ul id="recomendaciones" class="mt-3 small" style="display: none;"></ul>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/servicios.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/simulador.js"></script>
</body>

</html>
