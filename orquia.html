<!DOCTYPE html>

<head>

        content="Centro integral de bienestar especializado en fisioterapia, cosmiatría facial y corporal, terapias holísticas, masajes y orientación psicológica.">
    <meta name="keywords" content="fisioterapia, cosmiatría, masajes, acupuntura, psicología, bienestar">
    <meta name="author" content="Orquídea Wellness">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <!-- Google Fonts -->

        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm" id="navbar">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="assets/logo/Logo-OrquideaWellness.png" alt="Orquídea Wellness" class="logo-navbar">

                <div class="ms-2">
                    <span class="brand-title">ORQUÍDEA</span><br>
                    <small class="brand-subtitle">WELLNESS</small>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a href="./index.html">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="./simulador.html">
                            <i class="bi bi-stars me-1"></i>

                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="./orquia.html" class="active">
                            <i class="bi bi-robot me-1"></i>
                            OrquIA
                        </a>
                    </li>

                </ul>

                <button class="btn btn-outline-light ms-lg-3" id="darkModeBtn" aria-label="Cambiar modo oscuro"
                    title="Cambiar modo oscuro">

                    <i class="bi bi-moon-stars-fill"></i>

                </button>

            </div>

        </div>
    </nav>


    <!-- CHAT -->
    <main class="chat-container">

        <header class="chat-header">
            <h1>OrquIA</h1>
            <p>Tu asistente de bienestar y mejora personal</p>
        </header>

        <!-- MENSAJES -->
        <div id="chatBox" class="chat-box">
            <div class="msg bot">
                Hola 👋 soy OrquIA. ¿En qué te puedo ayudar hoy?
            </div>
        </div>

        <!-- INPUT -->
        <div class="chat-input">
            <input type="text" id="inputChat" placeholder="Escribe tu mensaje..." />
            <button onclick="enviarMensaje()">Enviar</button>
        </div>

    </main>

    <script src="./js/api.js"></script>
    <script src="./js/orquia.js"></script>
