                    <small class="brand-subtitle">WELLNESS</small>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#servicios">

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#promociones">
                            Promociones
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#psicologia">
                            Psicología
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#faq">
                            Preguntas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link nav-ia" href="simulador.html">

                    </li>

                    <li class="nav-item">
                        <a class="nav-link nav-orquia" href="orquia.html">

                            OrquIA
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contacto">
                            Contacto

                    </li>

                <button class="btn btn-outline-light ms-lg-3" id="darkModeBtn" aria-label="Cambiar modo oscuro"

                    <i class="bi bi-moon-stars-fill"></i>

                </button>

            </div>

        </div>

    <!-- CHAT -->
    <main class="chat-container">

        <header class="chat-header">
            <h1>OrquIA</h1>
            <p>Tu asistente de bienestar y mejora personal</p>
        </header>

        <!-- MENSAJES -->
        <div id="chatBox" class="chat-box">
            <div class="msg bot">
                Hola 👋 soy OrquIA. ¿En qué te puedo ayudar hoy?
            </div>
        </div>

        <!-- INPUT -->
        <div class="chat-input">
            <input type="text" id="inputChat" placeholder="Escribe tu mensaje..." />
            <button onclick="enviarMensaje()">Enviar</button>
        </div>

    </main>

    <script src="./js/api.js"></script>
    <script src="./js/orquia.js"></script>
