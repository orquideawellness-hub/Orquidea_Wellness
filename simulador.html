                    <small class="brand-subtitle">WELLNESS</small>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#inicio">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#nosotros">

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#servicios">
                            Servicios
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#promociones">
                            Promociones
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#psicologia">
                            Psicología
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#faq">
                            Preguntas

                    </li>

                    <li class="nav-item">
                        <a class="nav-link nav-ia" href="simulador.html">
                            <i class="bi bi-stars me-1"></i>
                            Simulador IA
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link nav-orquia" href="orquia.html">
                            <i class="bi bi-robot me-1"></i>

                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contacto">
                            Contacto

                <button class="btn btn-outline-light ms-lg-3" id="darkModeBtn" aria-label="Cambiar modo oscuro"
                    title="Cambiar modo oscuro">

                    <i class="bi bi-moon-stars-fill"></i>

                </button>

            </div>

        </div>

  <!-- CONTENIDO -->
  <main class="simulador-container">

    <section class="simulador-header">
      <h1>Simulador IA de Bienestar</h1>
      <p>Describe cómo te sientes y recibe una recomendación personalizada.</p>
    </section>

    <!-- INPUT -->
    <section class="simulador-input">
      <textarea id="inputSimulador" placeholder="Ej: Me siento estresado, con tensión en el cuello..."></textarea>

      <button onclick="ejecutarSimulador()">
        Generar recomendación
      </button>
    </section>

    <!-- RESULTADO -->
    <section class="simulador-result">
      <h2>Resultado</h2>
      <div id="resultadoSimulador">
        Aquí aparecerá tu recomendación...
      </div>
    </section>

  </main>

  <script src="./js/simulador.js"></script>
