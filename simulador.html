<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador IA | Orquídea Wellness</title>

    <!-- SEO -->
    <meta name="description"
        content="Centro integral de bienestar especializado en fisioterapia, cosmiatría facial y corporal, terapias holísticas, masajes y orientación psicológica.">

    <meta name="keywords" content="fisioterapia, cosmiatría, masajes, acupuntura, psicología, bienestar">
    <meta name="author" content="Orquídea Wellness">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/simulador.css">

    <link rel="icon" href="assets/icons/favicon.ico">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm" id="navbar">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="assets/logo/Logo-OrquideaWellness.png" alt="Orquídea Wellness" class="logo-navbar">

                <div class="ms-2">
                    <span class="brand-title">ORQUÍDEA</span><br>
                    <small class="brand-subtitle">WELLNESS</small>
                </div>
            </a>

        </div>
    </nav>


    <!-- CONTENIDO -->
    <main class="container py-5 mt-5">

        <div class="row g-4">

            <!-- FOTO -->
            <div class="col-lg-4">
                <div class="card shadow-sm p-4 h-100">

                    <h3 class="mb-4">1. Sube tu foto</h3>

                    <input type="file" id="fotoInput" accept="image/*" class="form-control mb-3">

                    <img id="previewOriginal" class="img-fluid rounded d-none" alt="Foto original del usuario">

                </div>
            </div>

            <!-- TRATAMIENTOS -->
            <div class="col-lg-4">
                <div class="card shadow-sm p-4 h-100">

                    <h3 class="mb-4">2. Selecciona tratamientos</h3>

                    <div class="form-check">
                        <input class="form-check-input tratamiento" type="checkbox" value="Antiage">
                        <label class="form-check-label">Antiage</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input tratamiento" type="checkbox" value="Antiacné">
                        <label class="form-check-label">Antiacné</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input tratamiento" type="checkbox" value="Pigmentación">
                        <label class="form-check-label">Pigmentación</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input tratamiento" type="checkbox" value="Hydrafacial">
                        <label class="form-check-label">Hydrafacial</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input tratamiento" type="checkbox" value="Rosácea">
                        <label class="form-check-label">Rosácea</label>
                    </div>

                    <button id="btnProbar" class="btn btn-gold mt-4">
                        ✨ Probar
                    </button>

                </div>
            </div>

            <!-- RESULTADO -->
            <div class="col-lg-4">
                <div class="card shadow-sm p-4 h-100">

                    <h3>Resultado IA</h3>

                    <!-- IMAGEN IA -->
                    <img id="previewIA" class="img-fluid rounded mt-3 d-none"
                        alt="Resultado generado por inteligencia artificial">

                    <!-- BOTÓN -->
                    <button id="btnRecomendaciones"
                        class="btn btn-outline-success mt-4 d-none"
                        aria-expanded="false">
                        Ver sugerencias adicionales
                    </button>

                    <!-- LISTA -->
                    <ul id="recomendaciones"
                        class="mt-3"
                        aria-live="polite">
                    </ul>

                </div>
            </div>

        </div>

    </main>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/servicios.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/simulador.js"></script>

</body>

</html>
